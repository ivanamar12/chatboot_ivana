<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE Tutor | AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --accent-primary: #818cf8;
            --accent-secondary: #2dd4bf;
            --accent-glow: rgba(129, 140, 248, 0.4);
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --bot-bubble: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            --user-bubble: rgba(255, 255, 255, 0.03);
            --input-bg: rgba(2, 6, 23, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(45, 212, 191, 0.1) 0%, transparent 50%),
                var(--bg-deep);
        }

        .app-container {
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            animation: containerEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerEntry {
            from { opacity: 0; transform: scale(0.98) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Header */
        header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.01);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-ring {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(to right, var(--text-main), var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Chat Area */
        #chat-window {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        #chat-window::-webkit-scrollbar {
            width: 5px;
        }

        #chat-window::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 18px 22px;
            border-radius: 22px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: messageFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            white-space: pre-wrap;
            border: 1px solid transparent;
        }

        @keyframes messageFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            border-color: rgba(99, 102, 241, 0.2);
            border-bottom-left-radius: 4px;
            color: #e2e8f0;
        }

        .user {
            align-self: flex-end;
            background: var(--user-bubble);
            border-color: var(--glass-border);
            border-bottom-right-radius: 4px;
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Input Area */
        .input-container {
            padding: 32px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.4), transparent);
        }

        .input-area {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            padding: 8px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            transition: all 0.3s;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .input-area:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1), 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        input::placeholder {
            color: var(--text-dim);
        }

        button {
            background: var(--accent-primary);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: scale(1.05);
            background: #717cf0;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        button:active {
            transform: scale(0.95);
        }

        button svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Typing Indicator */
        .typing {
            display: none;
            gap: 6px;
            padding: 14px 20px;
            background: var(--bot-bubble);
            border-radius: 20px;
            width: fit-content;
            margin-bottom: 10px;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .dot {
            width: 5px;
            height: 5px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
            }

            header {
                padding: 16px 20px;
            }

            #chat-window {
                padding: 20px;
            }

            .message {
                max-width: 90%;
            }

            .input-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-left">
                <div class="logo-ring">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                </div>
                <div>
                    <h1>SE Tutor IA</h1>
                    <p style="font-size: 0.75rem; color: var(--text-dim); font-weight: 500;">Basado en Groq & RAG</p>
                </div>
            </div>
            <div class="status-badge">
                <div class="pulse-dot"></div>
                En línea
            </div>
        </header>

        <main id="chat-window">
            <div class="message bot">
                ¡Hola! Soy tu tutor especializado en Ingeniería de Software. 
                
He cargado el manual **i_s.pdf** y estoy listo para responder cualquier duda basándome en ese contenido. ¿En qué puedo ayudarte hoy?
            </div>
        </main>

        <div class="input-container">
            <div id="typing-indicator" class="typing">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <form class="input-area" id="chat-form">
                <input type="text" id="user-input" placeholder="Pregunta sobre Ingeniería de Software..." autocomplete="off">
                <button type="submit">
                    <svg viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.textContent = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTyping() {
            typingIndicator.style.display = 'flex';
            chatWindow.appendChild(typingIndicator);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function hideTyping() {
            typingIndicator.style.display = 'none';
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';

            showTyping();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();
                hideTyping();
                
                if (data.response) {
                    addMessage(data.response, 'bot');
                } else if (data.error) {
                    addMessage("Lo siento, ocurrió un error: " + data.error, 'bot');
                }
            } catch (error) {
                hideTyping();
                addMessage("Hubo un error al conectar con el servidor. Revisa tu conexión.", 'bot');
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
